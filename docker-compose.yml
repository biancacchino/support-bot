services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      # Persist the embedding + reranker weights so a restart does not
      # re-download a few hundred MB from HuggingFace.
      - models:/models
    depends_on:
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  qdrant:
    image: qdrant/qdrant:v1.12.1
    ports:
      - "6333:6333"
    volumes:
      - qdrant:/qdrant/storage
    # No healthcheck: the image ships no curl/wget, and a shell-based TCP probe
    # would be a guess. The app gates on its own /health, which probes Qdrant
    # directly, so readiness is reported there rather than faked here.

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  models:
  qdrant:
  redis:
