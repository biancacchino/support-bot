services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      # Empty means /admin/metrics is open, which is the right default locally.
      ADMIN_API_KEY: ${ADMIN_API_KEY:-}
    volumes:
      # Persist the embedding + reranker weights so a restart does not
      # re-download a few hundred MB from HuggingFace.
      - models:/models
      # The KB is baked into the image, but re-ingestion is meant to be run
      # against edited docs. Bind-mounting means editing a doc and re-running
      # the ingest script picks it up without a rebuild.
      - ./kb:/srv/kb:ro
    depends_on:
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  qdrant:
    # Kept in step with the qdrant-client major/minor in requirements.txt. The
    # client refuses to guarantee compatibility across a wider gap than one
    # minor version, and warns on every call when it sees one.
    image: qdrant/qdrant:v1.18.2
    ports:
      - "6333:6333"
    volumes:
      - qdrant:/qdrant/storage
    # No healthcheck: the image ships no curl/wget, and a shell-based TCP probe
    # would be a guess. The app gates on its own /health, which probes Qdrant
    # directly, so readiness is reported there rather than faked here.

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  models:
  qdrant:
  redis:
